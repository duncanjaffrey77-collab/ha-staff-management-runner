build_from:
  amd64: ghcr.io/home-assistant/amd64-base-debian:bookworm

# Debian Bookworm base — required because the actions/runner binary
# embeds a .NET 6 runtime built against glibc, which doesn't work on
# Alpine's musl libc (actions/runner#801). See Dockerfile for the full
# explanation.
#
# Available tags: https://github.com/home-assistant/docker-base/pkgs/container/amd64-base-debian
# Bookworm == Debian 12, current stable through ~2028.
