name: "GitHub Actions Runner (multi-repo)"
slug: "github-runner"
version: "3.0.3"
description: "Self-hosted GitHub Actions runner — one HA add-on, any number of repos."
arch:
  - amd64
init: false
boot: auto
startup: services
host_network: false
hassio_api: false

# Options:
#   The `runners:` list is the canonical config. Each entry registers an
#   independent runner against its named repo. Per-runner credentials persist
#   under /data/runner-credentials/<name>/ so Stop/Start/Update cycles never
#   need a fresh registration token after the first start.
#
# v3.0.0 removed the legacy single-runner fields (`github_repo`,
# `github_runner_token`, `runner_name`, `runner_labels`) that v1.x→v2.x
# carried forward for backwards compat. The v1.x → v2.x credential migration
# code in the launch script is retained as a no-op safety net for any
# hypothetical v1.x → v3.0 direct upgrade.
options:
  runners: []
  workdir_base: "/data/_work"

schema:
  runners:
    - name: str
      repo: str
      labels: str
      registration_token: password
  workdir_base: str
